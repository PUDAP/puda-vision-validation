<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Template machine deck region annotation example</title>
  <desc id="desc">Synthetic example showing a perspective deck outline with six labelled region boxes and an occupancy colour legend. This is not machine evidence.</desc>
  <rect width="1200" height="760" fill="#111827"/>
  <text x="60" y="62" fill="#f9fafb" font-family="sans-serif" font-size="30" font-weight="700">TEMPLATE ONLY — replace with target machine evidence</text>
  <text x="60" y="98" fill="#9ca3af" font-family="sans-serif" font-size="18">Shared perspective boundaries • one box per visible region • machine-native labels</text>

  <!-- Full deck outer boundary -->
  <polygon points="125,180 1035,145 1100,615 80,650" fill="#1f2937" stroke="#e5e7eb" stroke-width="7"/>

  <!-- Shared lattice: columns x = interpolated perspective nodes, rows share exact edges -->
  <polygon points="125,180 425,168 410,400 103,414" fill="none" stroke="#22c55e" stroke-width="7"/>
  <polygon points="425,168 730,156 754,387 410,400" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="7"/>
  <polygon points="730,156 1035,145 1067,374 754,387" fill="none" stroke="#22c55e" stroke-width="7"/>
  <polygon points="103,414 410,400 392,632 80,650" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-width="7"/>
  <polygon points="410,400 754,387 782,625 392,632" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="7"/>
  <polygon points="754,387 1067,374 1100,615 782,625" fill="none" stroke="#9ca3af" stroke-width="7" stroke-dasharray="18 12"/>

  <g font-family="sans-serif" font-size="23" font-weight="700">
    <rect x="142" y="205" width="190" height="38" rx="6" fill="#052e16"/><text x="156" y="232" fill="#86efac">ZONE-A: EMPTY</text>
    <rect x="465" y="193" width="245" height="38" rx="6" fill="#450a0a"/><text x="479" y="220" fill="#fca5a5">ZONE-B: OCCUPIED</text>
    <rect x="786" y="181" width="192" height="38" rx="6" fill="#052e16"/><text x="800" y="208" fill="#86efac">ZONE-C: EMPTY</text>
    <rect x="124" y="444" width="255" height="38" rx="6" fill="#431407"/><text x="138" y="471" fill="#fdba74">ZONE-D: OBSTRUCTED</text>
    <rect x="459" y="431" width="250" height="38" rx="6" fill="#450a0a"/><text x="473" y="458" fill="#fca5a5">ZONE-E: OCCUPIED</text>
    <rect x="821" y="418" width="250" height="38" rx="6" fill="#1f2937"/><text x="835" y="445" fill="#d1d5db">ZONE-F: NOT VISIBLE</text>
  </g>

  <!-- Legend -->
  <rect x="180" y="682" width="840" height="58" rx="12" fill="#030712" stroke="#374151" stroke-width="2"/>
  <g font-family="sans-serif" font-size="20" font-weight="600">
    <rect x="215" y="699" width="30" height="24" fill="#22c55e"/><text x="257" y="719" fill="#f3f4f6">EMPTY</text>
    <rect x="390" y="699" width="30" height="24" fill="#ef4444"/><text x="432" y="719" fill="#f3f4f6">OCCUPIED</text>
    <rect x="600" y="699" width="30" height="24" fill="#f97316"/><text x="642" y="719" fill="#f3f4f6">OBSTRUCTED</text>
    <rect x="835" y="699" width="30" height="24" fill="#9ca3af"/><text x="877" y="719" fill="#f3f4f6">NOT VISIBLE</text>
  </g>
</svg>
